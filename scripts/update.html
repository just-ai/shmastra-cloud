<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shmastra Sandbox Manager</title>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19?dev",
        "react-dom/client": "https://esm.sh/react-dom@19/client?dev",
        "react/jsx-runtime": "https://esm.sh/react@19/jsx-runtime?dev"
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-0: #0a0a0a;
      --bg-1: #111111;
      --bg-2: #1a1a1a;
      --bg-3: #222222;
      --border: #2a2a2a;
      --border-light: #333333;
      --text-0: #e5e5e5;
      --text-1: #a0a0a0;
      --text-2: #666666;
      --text-3: #444444;
      --green: #22c55e;
      --green-dim: #16a34a;
      --green-bg: rgba(34, 197, 94, 0.1);
      --blue: #3b82f6;
      --blue-bg: rgba(59, 130, 246, 0.1);
      --red: #ef4444;
      --red-bg: rgba(239, 68, 68, 0.1);
      --yellow: #eab308;
      --yellow-bg: rgba(234, 179, 8, 0.1);
    }

    body {
      background: var(--bg-0);
      color: var(--text-0);
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 14px;
      height: 100vh;
      overflow: hidden;
    }

    .mono { font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; }

    .panel-enter { animation: slideIn 0.15s ease-out; }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-3); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import { createElement as h, useState, useEffect, useRef, useCallback } from "react";
    import { createRoot } from "react-dom/client";

    const API = window.location.origin;

    function App() {
      const PHASES = ["connect", "setup", "fetch", "merge", "install", "build", "apply", "restart"];
      const [sandboxes, setSandboxes] = useState([]);
      const [statuses, setStatuses] = useState({});
      const [phases, setPhases] = useState({});
      const [logs, setLogs] = useState({});
      const [selected, setSelected] = useState(null);
      const [loading, setLoading] = useState(true);
      const logEndRef = useRef(null);

      useEffect(() => {
        fetch(`${API}/api/sandboxes`)
          .then((r) => r.json())
          .then((entries) => { setSandboxes(entries); setLoading(false); })
          .catch(() => setLoading(false));
      }, []);

      useEffect(() => {
        const es = new EventSource(`${API}/api/events`);
        es.addEventListener("log", (e) => {
          const { sandboxId, message } = JSON.parse(e.data);
          setLogs((prev) => ({
            ...prev,
            [sandboxId]: [...(prev[sandboxId] || []), { time: new Date(), message }],
          }));
        });
        es.addEventListener("status", (e) => {
          const { sandboxId, status } = JSON.parse(e.data);
          setStatuses((prev) => ({ ...prev, [sandboxId]: status }));
          if (status !== "running") setPhases((prev) => ({ ...prev, [sandboxId]: null }));
        });
        es.addEventListener("phase", (e) => {
          const { sandboxId, phase } = JSON.parse(e.data);
          setPhases((prev) => ({ ...prev, [sandboxId]: phase }));
        });
        return () => es.close();
      }, []);

      useEffect(() => {
        logEndRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [logs, selected]);

      const updateOne = useCallback((id) => {
        fetch(`${API}/api/update/${id}`, { method: "POST" });
      }, []);

      const stopOne = useCallback((id) => {
        fetch(`${API}/api/stop/${id}`, { method: "POST" });
      }, []);

      const updateAll = useCallback(() => {
        fetch(`${API}/api/update-all`, { method: "POST" });
      }, []);

      const stopAll = useCallback(() => {
        fetch(`${API}/api/stop-all`, { method: "POST" });
      }, []);

      const [search, setSearch] = useState("");
      const getStatus = (id) => statuses[id] || "pending";
      const anyRunning = Object.values(statuses).some((s) => s === "running");
      const filtered = sandboxes.filter(({ sandboxId, email }) => {
        if (!search) return true;
        const q = search.toLowerCase();
        return sandboxId.toLowerCase().includes(q) || email.toLowerCase().includes(q);
      });

      const badge = (s, phase) => {
        const styles = {
          pending:  { background: "var(--bg-3)", color: "var(--text-2)", dot: "var(--text-3)" },
          running:  { background: "var(--blue-bg)", color: "var(--blue)", dot: "var(--blue)" },
          success:  { background: "var(--green-bg)", color: "var(--green)", dot: "var(--green)" },
          error:    { background: "var(--red-bg)", color: "var(--red)", dot: "var(--red)" },
          stopped:  { background: "var(--yellow-bg)", color: "var(--yellow)", dot: "var(--yellow)" },
        }[s] || { background: "var(--bg-3)", color: "var(--text-2)", dot: "var(--text-3)" };

        const label = s === "running" && phase ? phase : s;

        return h("span", {
          style: {
            display: "inline-flex", alignItems: "center", gap: "6px",
            padding: "2px 10px 2px 8px", borderRadius: "9999px",
            fontSize: "12px", fontWeight: 500, fontFamily: "'JetBrains Mono', monospace",
            background: styles.background, color: styles.color,
          },
        },
          h("span", {
            className: s === "running" ? "animate-pulse" : "",
            style: {
              width: "6px", height: "6px", borderRadius: "50%",
              background: styles.dot, flexShrink: 0,
            },
          }),
          label,
        );
      };

      const selectedEntry = sandboxes.find((s) => s.sandboxId === selected);
      const selectedLogs = selected ? logs[selected] || [] : [];

      return h("div", { style: { display: "flex", height: "100vh" } },

        // Main
        h("div", {
          style: {
            flex: 1, overflow: "auto",
            marginRight: selected ? "680px" : "0",
            transition: "margin-right 0.15s ease",
          },
        },
          h("div", { style: { maxWidth: "960px", margin: "0 auto", padding: "32px 24px" } },

            // Header
            h("div", {
              style: {
                display: "flex", alignItems: "center", gap: "10px",
                marginBottom: "24px",
              },
            },
              // Search
              h("input", {
                type: "text",
                placeholder: "Search by email or sandbox id...",
                value: search,
                onChange: (e) => setSearch(e.target.value),
                style: {
                  flex: 1, padding: "3px 10px", borderRadius: "4px",
                  border: "1px solid var(--border)", background: "var(--bg-2)",
                  color: "var(--text-0)", fontSize: "12px", outline: "none",
                  fontFamily: "'JetBrains Mono', monospace",
                  height: "24px",
                },
              }),
              // Instance count
              h("span", {
                style: {
                  fontSize: "12px", color: "var(--text-2)",
                  background: "var(--bg-2)", border: "1px solid var(--border)",
                  padding: "3px 8px", borderRadius: "4px",
                  fontFamily: "'JetBrains Mono', monospace",
                  height: "24px", display: "inline-flex", alignItems: "center",
                  whiteSpace: "nowrap",
                },
              }, filtered.length + " / " + sandboxes.length),
              // Update All / Stop All
              h("button", {
                onClick: anyRunning ? stopAll : updateAll,
                style: {
                  padding: "3px 10px", borderRadius: "4px",
                  border: `1px solid ${anyRunning ? "var(--red)" : "var(--border)"}`,
                  background: anyRunning ? "var(--red-bg)" : "var(--bg-2)",
                  color: anyRunning ? "var(--red)" : "var(--green)",
                  cursor: "pointer",
                  fontSize: "12px", fontWeight: 500,
                  fontFamily: "'JetBrains Mono', monospace",
                  transition: "all 0.15s",
                  height: "24px", whiteSpace: "nowrap",
                },
                onMouseEnter: (e) => { e.target.style.background = anyRunning ? "rgba(239,68,68,0.2)" : "var(--bg-3)"; },
                onMouseLeave: (e) => { e.target.style.background = anyRunning ? "var(--red-bg)" : "var(--bg-2)"; },
              }, anyRunning ? "stop all" : "update all"),
            ),

            // Table
            loading
              ? h("div", {
                  style: { color: "var(--text-2)", textAlign: "center", padding: "48px 0" },
                }, "Loading...")
              : h("div", {
                  style: {
                    background: "var(--bg-1)", borderRadius: "8px",
                    border: "1px solid var(--border)", overflow: "hidden",
                  },
                },
                  h("table", { style: { width: "100%", borderCollapse: "collapse" } },
                    h("thead", null,
                      h("tr", {
                        style: {
                          borderBottom: "1px solid var(--border)",
                          fontSize: "12px", color: "var(--text-2)",
                          fontFamily: "'JetBrains Mono', monospace",
                          textTransform: "uppercase", letterSpacing: "0.5px",
                        },
                      },
                        h("th", { style: { textAlign: "left", padding: "10px 16px", fontWeight: 500 } }, "Owner"),
                        h("th", { style: { textAlign: "left", padding: "10px 16px", fontWeight: 500 } }, "Sandbox"),
                        h("th", { style: { textAlign: "left", padding: "10px 16px", fontWeight: 500, width: "100px" } }, "Status"),
                        h("th", { style: { textAlign: "right", padding: "10px 16px", fontWeight: 500, width: "100px" } }, ""),
                      ),
                    ),
                    h("tbody", null,
                      filtered.map(({ sandboxId: id, email }) =>
                        h("tr", {
                          key: id,
                          onClick: () => setSelected(selected === id ? null : id),
                          style: {
                            borderBottom: "1px solid var(--border)",
                            cursor: "pointer",
                            background: selected === id ? "var(--bg-2)" : "transparent",
                            transition: "background 0.1s",
                          },
                          onMouseEnter: (e) => { if (selected !== id) e.currentTarget.style.background = "var(--bg-2)"; },
                          onMouseLeave: (e) => { if (selected !== id) e.currentTarget.style.background = "transparent"; },
                        },
                          h("td", {
                            style: { padding: "12px 16px", fontSize: "13px", color: "var(--text-1)" },
                          }, email),
                          h("td", {
                            className: "mono",
                            style: { padding: "12px 16px", fontSize: "12px", color: "var(--text-2)" },
                          }, id),
                          h("td", { style: { padding: "12px 16px" } }, badge(getStatus(id), phases[id])),
                          h("td", { style: { padding: "12px 16px", textAlign: "right" } },
                            getStatus(id) === "running"
                              ? h("button", {
                                  onClick: (e) => { e.stopPropagation(); stopOne(id); },
                                  style: {
                                    padding: "4px 12px", borderRadius: "4px",
                                    border: "1px solid var(--red)",
                                    background: "var(--red-bg)",
                                    color: "var(--red)",
                                    cursor: "pointer",
                                    fontSize: "12px", fontFamily: "'JetBrains Mono', monospace",
                                    transition: "all 0.15s",
                                  },
                                  onMouseEnter: (e) => { e.target.style.background = "rgba(239,68,68,0.2)"; },
                                  onMouseLeave: (e) => { e.target.style.background = "var(--red-bg)"; },
                                }, "stop")
                              : h("button", {
                                  onClick: (e) => { e.stopPropagation(); updateOne(id); },
                                  style: {
                                    padding: "4px 12px", borderRadius: "4px",
                                    border: "1px solid var(--border)",
                                    background: "transparent",
                                    color: "var(--text-1)",
                                    cursor: "pointer",
                                    fontSize: "12px", fontFamily: "'JetBrains Mono', monospace",
                                    transition: "all 0.15s",
                                  },
                                  onMouseEnter: (e) => { e.target.style.background = "var(--bg-3)"; },
                                  onMouseLeave: (e) => { e.target.style.background = "transparent"; },
                                }, "update"),
                          ),
                        ),
                      ),
                    ),
                  ),
                ),
          ),
        ),

        // Slide-out log panel
        selected && h("div", {
          className: "panel-enter",
          style: {
            position: "fixed", top: 0, right: 0, width: "680px", height: "100vh",
            background: "var(--bg-1)", borderLeft: "1px solid var(--border)",
            display: "flex", flexDirection: "column",
          },
        },
          // Panel header
          h("div", {
            style: {
              display: "flex", alignItems: "center", justifyContent: "space-between",
              padding: "12px 16px", borderBottom: "1px solid var(--border)",
              minHeight: "48px",
            },
          },
            h("div", { style: { display: "flex", alignItems: "center", gap: "10px" } },
              h("span", {
                style: { fontSize: "13px", color: "var(--text-1)", fontWeight: 500 },
              }, selectedEntry?.email || selected),
              badge(getStatus(selected), phases[selected]),
            ),
            h("button", {
              onClick: () => setSelected(null),
              style: {
                background: "none", border: "none", color: "var(--text-2)",
                cursor: "pointer", fontSize: "16px", padding: "4px",
                lineHeight: 1,
              },
              onMouseEnter: (e) => { e.target.style.color = "var(--text-0)"; },
              onMouseLeave: (e) => { e.target.style.color = "var(--text-2)"; },
            }, "\u2715"),
          ),

          // Phase progress bar
          getStatus(selected) === "running" && phases[selected] && h("div", {
            style: { padding: "8px 16px", borderBottom: "1px solid var(--border)" },
          },
            h("div", {
              style: { display: "flex", gap: "2px", alignItems: "center" },
            },
              ...PHASES.map((p, i) => {
                const currentIdx = PHASES.indexOf(phases[selected]);
                const done = i < currentIdx;
                const active = i === currentIdx;
                return h("div", {
                  key: p,
                  style: {
                    flex: 1, height: "3px", borderRadius: "1.5px",
                    background: done ? "var(--green)" : active ? "var(--blue)" : "var(--bg-3)",
                    transition: "background 0.3s",
                    ...(active ? { animation: "pulse 2s ease-in-out infinite" } : {}),
                  },
                  title: p,
                });
              }),
            ),
            h("div", {
              className: "mono",
              style: {
                display: "flex", justifyContent: "space-between",
                fontSize: "10px", color: "var(--text-3)", marginTop: "4px",
              },
            },
              ...PHASES.map((p, i) => {
                const currentIdx = PHASES.indexOf(phases[selected]);
                const done = i < currentIdx;
                const active = i === currentIdx;
                return h("span", {
                  key: p,
                  style: {
                    flex: 1, textAlign: "center",
                    color: done ? "var(--green)" : active ? "var(--blue)" : "var(--text-3)",
                  },
                }, p);
              }),
            ),
          ),

          // Logs
          h("div", {
            style: {
              flex: 1, overflow: "auto", padding: "8px 0",
              background: "var(--bg-0)",
            },
          },
            selectedLogs.length === 0
              ? h("div", {
                  className: "mono",
                  style: {
                    color: "var(--text-3)", fontSize: "11px", textAlign: "center",
                    padding: "32px 0",
                  },
                }, "~ no logs yet ~")
              : selectedLogs.map((entry, i) =>
                  h("div", {
                    key: i,
                    className: "mono",
                    style: {
                      fontSize: "11px", lineHeight: "18px", color: "var(--text-2)",
                      whiteSpace: "pre-wrap", wordBreak: "break-all",
                      padding: "0 12px",
                      borderLeft: "2px solid transparent",
                      ...(entry.message.startsWith("$") ? { color: "var(--text-1)", borderLeftColor: "var(--text-3)" } : {}),
                      ...(entry.message.startsWith("✓") ? { color: "var(--green)" } : {}),
                      ...(entry.message.startsWith("✗") ? { color: "var(--red)" } : {}),
                      ...(entry.message.startsWith("⚠") ? { color: "var(--yellow)" } : {}),
                      ...(entry.message.startsWith("🤖") ? { color: "var(--blue)" } : {}),
                      ...(entry.message.startsWith("🔧") ? { color: "var(--text-1)", borderLeftColor: "var(--blue)" } : {}),
                    },
                  },
                    h("span", {
                      style: { color: "var(--text-3)", marginRight: "6px", fontSize: "10px", userSelect: "none" },
                    }, entry.time.toLocaleTimeString("en-GB")),
                    entry.message,
                  ),
                ),
            h("div", { ref: logEndRef }),
          ),
        ),
      );
    }

    createRoot(document.getElementById("root")).render(h(App));
  </script>
</body>
</html>
